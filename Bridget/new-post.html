<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="newpost.css">
</head>
<body>
    <div class="navbar">
        <div class="hamburger" id="hamburger-btn">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <div>
            <a href="homepage.html"> <img src="../images/logoipsum-custom-logo.svg" alt="logo"></a>
        </div>
        <div class="myprofile">
            <img src="../images/sky-pfp.png" alt="sky pfp icon" style="width: 50px; height: 50px;">
        </div>
    </div>


    <div class = container>
        <h1>New Post</h1>
        <textarea class="textbox" placeholder="What's up?"></textarea>
        <div class="button-container">
            <button class="saveButton" disabled>Save</button>
            <button class="sendButton" disabled>Send</button>
        </div>
    </div>

<script>
    var textContent = document.querySelector(".textbox");
    var sendButton = document.querySelector(".sendButton");
    var saveButton = document.querySelector(".saveButton");

    

    sendButton.disabled = true;
    saveButton.disabled = true;

    textContent.addEventListener("input", function(){
        sendButton.disabled = textContent.value.trim() === "";
        saveButton.disabled = textContent.value.trim() === "";
    })

    sendButton.addEventListener("click", function(){
    if (!sendButton.disabled) {
        var text = textContent.value.trim();

        var posts = JSON.parse(localStorage.getItem("posts")) || [];

        posts.unshift({
            id: "post-" + Date.now(),
            content: text,
            likes: 0
        });

        localStorage.setItem("posts", JSON.stringify(posts));

        window.location.href = "homepage.html";
    }
})

</script>

</body>
</html>

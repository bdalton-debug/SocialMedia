<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="user-profile.css">
</head>
<body>
    <div class="navbar">
        <button class="hamburger" id="hamburger-btn">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </button>
        <div>
            <a href="../index.html"> <img src="../images/logoipsum-custom-logo.svg" alt="logo"></a>
        </div>
        <div class="myprofile">
            <img src="../images/sky-pfp.png" alt="sky pfp icon" style="width: 50px; height: 50px;">
        </div>
    </div>
<div class="profile-header">
    <img src="../images/green-pfp.png" alt="green pfp icon" class="profile-pic">
    <div class="profile-info">
        <h2 class="profile-name">bob_dylan41</h2>
        <p class="profile-bio">just a guy who loves horses and railroads</p>
        <div class="follow-container">
            <span class="follower-count">128</span> followers
            <button type="button" class="followButton">Follow</button>
        </div>
    </div>
</div>

<div class="post-container">
    <div class="post" id="bob-post-1">
        <div class="username"> <img src="../images/green-pfp.png" alt="green pfp icon" style="width: 30px; height: 30px; margin-right: 10px;">bob_dylan41</div>
        <div class="content">
            <p> hangin' with my pal @j.cashmoney :P</p>
            <div class="like-container">
                <span class="counter">14</span>
                <button type="button" class="likeButton">
                    <svg class="heart-icon" viewBox="0 0 24 24" width="23" height="23" xmlns="http://www.w3.org/2000/svg">
                        <path class="heart-main" fill-rule="evenodd" clip-rule="evenodd" d="M2.87187 11.5983C1.79887 8.24832 3.05287 4.41932 6.56987 3.28632C8.41987 2.68932 10.4619 3.04132 11.9999 4.19832C13.4549 3.07332 15.5719 2.69332 17.4199 3.28632C20.9369 4.41932 22.1989 8.24832 21.1269 11.5983C19.4569 16.9083 11.9999 20.9983 11.9999 20.9983C11.9999 20.9983 4.59787 16.9703 2.87187 11.5983Z" stroke="#130F26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path class="heart-shine" opacity="0.4" d="M16 6.69995C17.07 7.04595 17.826 8.00095 17.917 9.12195" stroke="#130F26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <div class="post" id="bob-post-2">
        <div class="username"> <img src="../images/green-pfp.png" alt="green pfp icon" style="width: 30px; height: 30px; margin-right: 10px;">bob_dylan41</div>
        <div class="content">
            <p>just wrote a new song about railroads</p>
            <div class="like-container">
                <span class="counter">42</span>
                <button type="button" class="likeButton">
                    <svg class="heart-icon" viewBox="0 0 24 24" width="23" height="23" xmlns="http://www.w3.org/2000/svg">
                        <path class="heart-main" fill-rule="evenodd" clip-rule="evenodd" d="M2.87187 11.5983C1.79887 8.24832 3.05287 4.41932 6.56987 3.28632C8.41987 2.68932 10.4619 3.04132 11.9999 4.19832C13.4549 3.07332 15.5719 2.69332 17.4199 3.28632C20.9369 4.41932 22.1989 8.24832 21.1269 11.5983C19.4569 16.9083 11.9999 20.9983 11.9999 20.9983C11.9999 20.9983 4.59787 16.9703 2.87187 11.5983Z" stroke="#130F26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path class="heart-shine" opacity="0.4" d="M16 6.69995C17.07 7.04595 17.826 8.00095 17.917 9.12195" stroke="#130F26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    var followButton = document.querySelector(".followButton");
    var followerCount = document.querySelector(".follower-count");

    followButton.addEventListener("click", () => {
        let currentCount = Number(followerCount.innerHTML);
        if (followButton.classList.contains("following")) {
            followButton.classList.remove("following");
            followButton.textContent = "Follow";
            followerCount.innerHTML = currentCount - 1;
            localStorage.setItem("followingBob", "false");
        } else {
            followButton.classList.add("following");
            followButton.textContent = "Following";
            followerCount.innerHTML = currentCount +1;
            localStorage.setItem("followingBob", "true");
        }
    });

    var isFollowing = localStorage.getItem("followingBob") === "true";
    if (isFollowing) {
        followButton.classList.add("following");
        followButton.textContent = "Following";
        followerCount.innerHTML = Number(followerCount.innerHTML) + 1;
}

    var likeButtons = document.querySelectorAll(".likeButton");

    likeButtons.forEach((button) => {

        var post = button.closest(".post");
        var postId = post.id; 
        var counter = post.querySelector(".counter");
        var savedData = JSON.parse(localStorage.getItem(postId));

        if (savedData) {
            counter.innerHTML = savedData.count;
            if (savedData.liked) {
                button.classList.add("liked");
            }
        }
        button.addEventListener("click", () => {
            let currentCount = Number(counter.innerHTML);
            let isCurrentlyLiked = button.classList.contains("liked");

            if (isCurrentlyLiked) {
                button.classList.remove("liked");
                currentCount -= 1;
            } else {
                button.classList.add("liked");
                currentCount += 1;
            }

            counter.innerHTML = currentCount;
            localStorage.setItem(postId, JSON.stringify({
                liked: !isCurrentlyLiked,
                count: currentCount
            }));
        });
    });
</script>

</body>
</html>
